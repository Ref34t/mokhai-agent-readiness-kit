name: CI

# Per AgDR-0004: layered PHPCS + Plugin Check + 4-cell PHPUnit matrix, mirroring
# the WordPress/ai plugin's CI shape (the WP core team's own AI plugin).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # cs2pr posts inline annotations on PR diff

# Weekly cache stamp — busts caches every Monday so dep-resolver bugs surface
# within a week instead of festering. Matches WordPress/ai's pattern.
env:
  CACHE_DATE: ${{ github.event.repository.updated_at }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. PHP syntax sweep across the supported runtime range.
  #    Cheap, parallel-friendly, catches broken code in any single PHP version.
  # ---------------------------------------------------------------------------
  php-syntax:
    name: PHP syntax (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Syntax sweep
        run: |
          find . -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -not -path './build/*' \
            -print0 \
            | xargs -0 -n1 -P4 php -l

  # ---------------------------------------------------------------------------
  # 2. PHPCS — layered WordPress rulesets per phpcs.xml.dist (AgDR-0004).
  #    cs2pr converts PHPCS checkstyle output into inline PR annotations.
  # ---------------------------------------------------------------------------
  phpcs:
    name: PHPCS (WordPress + Slevomat layered)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2, cs2pr

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}-${{ env.CACHE_DATE }}
          restore-keys: |
            composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}-
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run PHPCS (report=checkstyle for cs2pr)
        run: ./vendor/bin/phpcs --report=checkstyle --report-file=phpcs-report.xml || true

      - name: cs2pr (inline annotations on PR diff)
        run: cs2pr phpcs-report.xml

  # ---------------------------------------------------------------------------
  # 3. PHPStan static analysis at level 5 (AgDR-0007).
  #    Catches the type-level bug class PHPCS does not see — null deref,
  #    wrong arg types, missing returns, unreachable code. Uses
  #    szepeviktor/phpstan-wordpress for WP-core type stubs. Runs at the
  #    PHP 7.4 floor (matches the runtime contract the code must satisfy).
  # ---------------------------------------------------------------------------
  phpstan:
    name: PHPStan (level 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2
          coverage: none

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-7.4-${{ hashFiles('composer.lock') }}-${{ env.CACHE_DATE }}
          restore-keys: |
            composer-${{ runner.os }}-7.4-${{ hashFiles('composer.lock') }}-
            composer-${{ runner.os }}-7.4-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run PHPStan
        run: composer phpstan

  # ---------------------------------------------------------------------------
  # 4. wp.org Plugin Check Tool against WP trunk.
  #    The gate for wp.org submission — must pass on every PR.
  # ---------------------------------------------------------------------------
  plugin-check:
    name: WP Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2

      - name: Install runtime Composer deps (no dev)
        # The Plugin Check action loads the plugin inside a real WP install,
        # which means ai-readiness-kit.php's `require vendor/autoload.php` must
        # find vendor/. vendor/ is gitignored; install it here. --no-dev
        # keeps the install lean (matches what would ship to wp.org).
        run: composer install --no-dev --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: Plugin Check
        uses: wordpress/plugin-check-action@v1.1.5
        with:
          build-dir: '.'
          slug: 'ai-readiness-kit'
          wp-version: 'trunk'
          # Plugin Check scans the entire build-dir as if it were the wp.org
          # zip. Repo-only files (CI config, lockfiles, dev tooling, dotfiles,
          # tests) aren't part of what would ship — exclude them so the scan
          # focuses on plugin runtime code. Mirrors WordPress/ai.
          exclude-directories: 'vendor,node_modules,tests,tools,.github,docs,languages'
          exclude-files: '.gitignore,.gitattributes,.editorconfig,.wp-env.json,composer.json,composer.lock,package.json,package-lock.json,phpcs.xml.dist,phpstan-baseline.neon,phpstan.neon.dist,phpunit.xml.dist'

  # ---------------------------------------------------------------------------
  # 5. PHPUnit unit suite — no wp-env, fast. Runs tests/Unit/* which use the
  #    Provider test seam (AgDR-0003) + tests/Unit/wp-stubs.php and don't
  #    require WordPress to be loaded.
  # ---------------------------------------------------------------------------
  phpunit-unit:
    name: PHPUnit unit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.lock') }}-${{ env.CACHE_DATE }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.lock') }}-
            composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite unit --no-coverage

  # ---------------------------------------------------------------------------
  # 6. PHPUnit integration suite — 4-cell matrix via wp-env.
  #    Runs tests/Integration/* which exercise the plugin against a real WP
  #    boot. See AgDR-0004 § "CI matrix shape" for why 4 cells and not 10.
  # ---------------------------------------------------------------------------
  phpunit-integration:
    name: PHPUnit integration (PHP ${{ matrix.php }} × WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1']
        wp: ['7.0', 'trunk']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.lock') }}-${{ env.CACHE_DATE }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.lock') }}-
            composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Install wp-env
        run: npm ci

      - name: Start wp-env (WP ${{ matrix.wp }})
        env:
          # WordPress doesn't tag a stable release for a major until GA. Until
          # WP 7.0 ships (PRD target 2026-07-01), the floor cell uses the open
          # `7.0-branch` development branch, which exists today. After GA the
          # matrix can switch to `tags/7.0`. `trunk` always maps to `master`.
          WP_ENV_CORE: ${{ matrix.wp == 'trunk' && 'WordPress/WordPress#master' || format('WordPress/WordPress#{0}-branch', matrix.wp) }}
          WP_ENV_PHP_VERSION: ${{ matrix.php }}
        run: npx wp-env start

      - name: Run integration tests
        # bash -c wrapper avoids wp-env / docker-exec arg-splitting weirdness
        # (the quoted form `"phpunit --testsuite integration"` would otherwise
        # land in docker exec as one argv element and fail with ENOENT).
        run: npx wp-env run tests-cli --env-cwd=wp-content/plugins/ai-readiness-kit bash -c "vendor/bin/phpunit --testsuite integration"

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop || true

  # ---------------------------------------------------------------------------
  # 7. Verify wp-scripts build artefacts.
  #    The bundled React admin UIs are emitted by webpack from
  #    `src/admin/<name>/index.js` to `build/admin/<name>.{js,asset.php}`.
  #    Artefacts are gitignored, so a stale or missing build only surfaces
  #    at wp.org submission time — or worse, as a user-reported "the
  #    Gutenberg sidebar / Context Profile editor doesn't render." This job
  #    runs `npm ci && npm run build` and asserts every entry point under
  #    `src/admin/` produced both its `.js` and `.asset.php` artefact,
  #    non-empty. The expected list is derived from `src/admin/*/index.js`
  #    so new admin bundles get covered automatically — same auto-discovery
  #    shape the webpack config uses.
  # ---------------------------------------------------------------------------
  check-build:
    name: Check build (wp-scripts artefacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies (deterministic)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify each src/admin/<name>/index.js produced build/admin/<name>.{js,asset.php}
        run: |
          set -e
          fail=0
          for entry in src/admin/*/index.js; do
            name=$(basename "$(dirname "$entry")")
            for ext in js asset.php; do
              artefact="build/admin/${name}.${ext}"
              if [ ! -s "$artefact" ]; then
                echo "::error::Missing or empty: $artefact (entry: $entry)"
                fail=1
              else
                size=$(stat -c%s "$artefact")
                echo "OK: $artefact ($size bytes)"
              fi
            done
          done
          exit $fail

  # ---------------------------------------------------------------------------
  # 8. Build the wp.org distribution ZIP and verify size + structure.
  #    Catches drift between the dev install and the production-only ZIP that
  #    ships to wp.org — composer dev deps slipping into the bundle, missing
  #    build/ artefacts after a webpack refactor, `.distignore` regressions
  #    that re-introduce excluded paths, the ZIP creeping over wp.org's 10 MB
  #    per-file ceiling. Runs the same `tools/build-zip.sh` an operator runs
  #    locally before submission.
  # ---------------------------------------------------------------------------
  build-zip-verify:
    name: Build ZIP + size check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2

      - name: Install Node dependencies (deterministic)
        run: npm ci

      - name: Build distribution ZIP
        run: bash tools/build-zip.sh

      - name: Inspect ZIP structure
        run: |
          ZIP=$(ls -1 dist/ai-readiness-kit-*.zip | head -n1)
          echo "Built: $ZIP"
          unzip -l "$ZIP" | head -20
          echo ""
          echo "File count: $(unzip -l "$ZIP" | tail -1 | awk '{print $2}')"

      - name: Verify ZIP excludes dev paths
        run: |
          ZIP=$(ls -1 dist/ai-readiness-kit-*.zip | head -n1)
          # Paths that MUST NOT appear inside the ZIP — mirrors `.distignore`.
          # Any of these slipping through means a regression in either the
          # exclude list or rsync invocation in tools/build-zip.sh.
          BANNED=(
            'ai-readiness-kit/\.claude/'
            'ai-readiness-kit/\.github/'
            'ai-readiness-kit/tests/'
            'ai-readiness-kit/tools/'
            'ai-readiness-kit/docs/'
            'ai-readiness-kit/src/'
            'ai-readiness-kit/node_modules/'
            'ai-readiness-kit/assets/'
            'ai-readiness-kit/package\.json'
            'ai-readiness-kit/package-lock\.json'
            'ai-readiness-kit/webpack\.config\.js'
            'ai-readiness-kit/README\.md'
            'ai-readiness-kit/\.distignore'
            'ai-readiness-kit/phpcs\.xml\.dist'
            'ai-readiness-kit/phpstan\.neon\.dist'
            'ai-readiness-kit/phpunit\.xml\.dist'
          )
          fail=0
          for p in "${BANNED[@]}"; do
            if unzip -l "$ZIP" | grep -qE "$p"; then
              echo "::error::Banned path present in ZIP: $p"
              fail=1
            fi
          done
          exit $fail

      - name: Verify required paths present
        run: |
          ZIP=$(ls -1 dist/ai-readiness-kit-*.zip | head -n1)
          REQUIRED=(
            'ai-readiness-kit/ai-readiness-kit\.php'
            'ai-readiness-kit/readme\.txt'
            'ai-readiness-kit/LICENSE'
            'ai-readiness-kit/uninstall\.php'
            'ai-readiness-kit/includes/Main\.php'
            'ai-readiness-kit/build/admin/'
            'ai-readiness-kit/vendor/autoload\.php'
          )
          fail=0
          for p in "${REQUIRED[@]}"; do
            if ! unzip -l "$ZIP" | grep -qE "$p"; then
              echo "::error::Required path missing from ZIP: $p"
              fail=1
            fi
          done
          exit $fail

      - name: Verify ZIP size under wp.org 10 MB ceiling
        run: |
          ZIP=$(ls -1 dist/ai-readiness-kit-*.zip | head -n1)
          SIZE=$(stat -c%s "$ZIP")
          MB=$(awk "BEGIN{printf \"%.2f\", $SIZE/1048576}")
          echo "ZIP size: $MB MB ($SIZE bytes)"
          if [ "$SIZE" -gt 10485760 ]; then
            echo "::error::ZIP exceeds wp.org 10 MB ceiling: $MB MB"
            exit 1
          fi

      - name: Upload built ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-readiness-kit-zip
          path: dist/ai-readiness-kit-*.zip
          retention-days: 7
