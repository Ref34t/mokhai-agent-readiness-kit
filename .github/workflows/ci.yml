name: CI

# Per AgDR-0004: layered PHPCS + Plugin Check + 4-cell PHPUnit matrix, mirroring
# the WordPress/ai plugin's CI shape (the WP core team's own AI plugin).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # cs2pr posts inline annotations on PR diff

# Weekly cache stamp — busts caches every Monday so dep-resolver bugs surface
# within a week instead of festering. Matches WordPress/ai's pattern.
env:
  CACHE_DATE: ${{ github.event.repository.updated_at }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. PHP syntax sweep across the supported runtime range.
  #    Cheap, parallel-friendly, catches broken code in any single PHP version.
  # ---------------------------------------------------------------------------
  php-syntax:
    name: PHP syntax (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Syntax sweep
        run: |
          find . -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -not -path './build/*' \
            -print0 \
            | xargs -0 -n1 -P4 php -l

  # ---------------------------------------------------------------------------
  # 2. PHPCS — layered WordPress rulesets per phpcs.xml.dist (AgDR-0004).
  #    cs2pr converts PHPCS checkstyle output into inline PR annotations.
  # ---------------------------------------------------------------------------
  phpcs:
    name: PHPCS (WordPress + Slevomat layered)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2, cs2pr

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}-${{ env.CACHE_DATE }}
          restore-keys: |
            composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}-
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      # PHPCS is the hard gate. It emits a full human-readable report to the
      # step log (so violations are visible even when cs2pr can't fetch) AND a
      # checkstyle file for the annotation step. continue-on-error lets the job
      # reach the annotation + gate steps; the gate below re-asserts the result.
      - name: Run PHPCS (full log + checkstyle for cs2pr)
        id: phpcs
        continue-on-error: true
        run: ./vendor/bin/phpcs --report-full --report-checkstyle=phpcs-report.xml

      # Annotations are best-effort. cs2pr is fetched by setup-php and has been
      # observed to come back as a 504 HTML page on transient upstream flakes
      # (GH-184); when that happens this step fails but MUST NOT fail the job —
      # the PHPCS result is gated below, independent of annotation delivery.
      - name: cs2pr (inline annotations on PR diff)
        continue-on-error: true
        run: cs2pr phpcs-report.xml

      # Re-assert the PHPCS result as the authoritative gate. A genuine sniff
      # violation fails the job here regardless of whether cs2pr ran; a clean
      # PHPCS run passes even if the annotation fetch flaked.
      - name: Gate on PHPCS result
        if: steps.phpcs.outcome == 'failure'
        run: |
          echo "::error::PHPCS reported violations — see the 'Run PHPCS' step log above (and PR annotations if cs2pr was available)."
          exit 1

  # ---------------------------------------------------------------------------
  # 3. PHPStan static analysis at level 5 (AgDR-0007).
  #    Catches the type-level bug class PHPCS does not see — null deref,
  #    wrong arg types, missing returns, unreachable code. Uses
  #    szepeviktor/phpstan-wordpress for WP-core type stubs. Runs at the
  #    PHP 7.4 floor (matches the runtime contract the code must satisfy).
  # ---------------------------------------------------------------------------
  phpstan:
    name: PHPStan (level 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2
          coverage: none

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-7.4-${{ hashFiles('composer.lock') }}-${{ env.CACHE_DATE }}
          restore-keys: |
            composer-${{ runner.os }}-7.4-${{ hashFiles('composer.lock') }}-
            composer-${{ runner.os }}-7.4-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run PHPStan
        run: composer phpstan

  # ---------------------------------------------------------------------------
  # 4. wp.org Plugin Check — the gate for wp.org submission; must pass on
  #    every PR.
  #
  #    Runs the wp.org Plugin Check tool against the plugin inside our OWN
  #    wp-env (the same environment the integration matrix boots without
  #    issue). We dropped wordpress/plugin-check-action: it shells out to its
  #    own wp-env, and a wp-env release on the GitHub runner broke its
  #    start -> run handoff ("Environment not initialized"), turning this job
  #    red on every PR (and on main) regardless of plugin code — independent
  #    of any diff. Driving wp-env ourselves removes that third-party
  #    fragility and mirrors the exact `wp plugin check` flow we run locally.
  # ---------------------------------------------------------------------------
  plugin-check:
    name: WP Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2

      - name: Install runtime Composer deps (no dev)
        # ai-readiness-kit.php's `require vendor/autoload.php` must resolve when
        # WP loads the plugin. vendor/ is gitignored; install it here. --no-dev
        # mirrors what ships to wp.org.
        run: composer install --no-dev --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: Install wp-env
        run: npm ci

      - name: Start wp-env (stable WP line)
        env:
          # Validate against the released WP a wp.org reviewer / user runs, not
          # master. 7.0-branch is the same core the integration matrix's stable
          # cell boots successfully.
          WP_ENV_CORE: WordPress/WordPress#7.0-branch
        run: npx wp-env start

      - name: Install Plugin Check; activate the plugin
        # .wp-env.json mounts the plugin source once, at the wp.org slug path
        # `wp-content/plugins/ai-readiness-kit` (#195). The activate below is
        # idempotent with the config's afterStart lifecycle script — kept
        # explicit so this job doesn't silently depend on lifecycle ordering.
        run: |
          npx wp-env run cli wp plugin install plugin-check --activate
          npx wp-env run cli wp plugin activate ai-readiness-kit

      - name: Run Plugin Check (errors fail the job)
        run: |
          set -uo pipefail
          # Repo-only files (CI config, lockfiles, dev tooling, dotfiles, tests)
          # aren't part of the wp.org zip — exclude them so the scan focuses on
          # plugin runtime code. Mirrors the old action's exclude lists, plus
          # .distignore (a repo-only dev dotfile).
          npx wp-env run cli wp plugin check ai-readiness-kit \
            --exclude-directories=vendor,node_modules,tests,tools,.github,docs,languages \
            --exclude-files=.gitignore,.gitattributes,.editorconfig,.distignore,.wp-env.json,composer.json,composer.lock,package.json,package-lock.json,phpcs.xml.dist,phpstan-baseline.neon,phpstan.neon.dist,phpunit.xml.dist \
            --format=csv --fields=file,line,type,code 2>/dev/null > pc.csv || true
          echo "--- Plugin Check findings (file,line,type,code) ---"
          cat pc.csv || true
          # Fail on any ERROR-severity finding EXCEPT one documented false
          # positive: Wp_Ai_Client_Provider::generate() calls wp_ai_client_prompt()
          # (a WP 7.0 function) only AFTER a function_exists() guard, so the plugin
          # keeps its 6.9 floor — the AI feature is optional. Plugin Check's static
          # checker can't see the runtime guard, so it mis-reports
          # wp_function_not_compatible_with_requires_wp. Everything else blocks.
          blocking="$(grep ',ERROR,' pc.csv | grep -v 'wp_function_not_compatible_with_requires_wp' || true)"
          if [ -n "$blocking" ]; then
            echo "::error::Plugin Check found blocking error(s):"
            echo "$blocking"
            exit 1
          fi
          echo "Plugin Check passed — no blocking errors."

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop || true

  # ---------------------------------------------------------------------------
  # 5. PHPUnit unit suite — no wp-env, fast. Runs tests/Unit/* which use the
  #    Provider test seam (AgDR-0003) + tests/Unit/wp-stubs.php and don't
  #    require WordPress to be loaded.
  # ---------------------------------------------------------------------------
  phpunit-unit:
    name: PHPUnit unit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.lock') }}-${{ env.CACHE_DATE }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.lock') }}-
            composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite unit --no-coverage

  # ---------------------------------------------------------------------------
  # 6. PHPUnit integration suite — 4-cell matrix via wp-env.
  #    Runs tests/Integration/* which exercise the plugin against a real WP
  #    boot. See AgDR-0004 § "CI matrix shape" for why 4 cells and not 10.
  # ---------------------------------------------------------------------------
  phpunit-integration:
    name: PHPUnit integration (PHP ${{ matrix.php }} × WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1']
        wp: ['7.0', 'trunk']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.lock') }}-${{ env.CACHE_DATE }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.lock') }}-
            composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Install wp-env
        run: npm ci

      - name: Start wp-env (WP ${{ matrix.wp }})
        env:
          # WordPress doesn't tag a stable release for a major until GA. Until
          # WP 7.0 ships (PRD target 2026-07-01), the floor cell uses the open
          # `7.0-branch` development branch, which exists today. After GA the
          # matrix can switch to `tags/7.0`. `trunk` always maps to `master`.
          WP_ENV_CORE: ${{ matrix.wp == 'trunk' && 'WordPress/WordPress#master' || format('WordPress/WordPress#{0}-branch', matrix.wp) }}
          WP_ENV_PHP_VERSION: ${{ matrix.php }}
        run: npx wp-env start

      - name: Run integration tests
        # bash -c wrapper avoids wp-env / docker-exec arg-splitting weirdness
        # (the quoted form `"phpunit --testsuite integration"` would otherwise
        # land in docker exec as one argv element and fail with ENOENT).
        run: npx wp-env run tests-cli --env-cwd=wp-content/plugins/ai-readiness-kit bash -c "vendor/bin/phpunit --testsuite integration"

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop || true

  # ---------------------------------------------------------------------------
  # 7. Verify wp-scripts build artefacts.
  #    The bundled React admin UIs are emitted by webpack from
  #    `src/admin/<name>/index.js` to `build/admin/<name>.{js,asset.php}`.
  #    Artefacts are gitignored, so a stale or missing build only surfaces
  #    at wp.org submission time — or worse, as a user-reported "the
  #    Gutenberg sidebar / Context Profile editor doesn't render." This job
  #    runs `npm ci && npm run build` and asserts every entry point under
  #    `src/admin/` produced both its `.js` and `.asset.php` artefact,
  #    non-empty. The expected list is derived from `src/admin/*/index.js`
  #    so new admin bundles get covered automatically — same auto-discovery
  #    shape the webpack config uses.
  # ---------------------------------------------------------------------------
  check-build:
    name: Check build (wp-scripts artefacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies (deterministic)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify each src/admin/<name>/index.js produced build/admin/<name>.{js,asset.php}
        run: |
          set -e
          fail=0
          for entry in src/admin/*/index.js; do
            name=$(basename "$(dirname "$entry")")
            for ext in js asset.php; do
              artefact="build/admin/${name}.${ext}"
              if [ ! -s "$artefact" ]; then
                echo "::error::Missing or empty: $artefact (entry: $entry)"
                fail=1
              else
                size=$(stat -c%s "$artefact")
                echo "OK: $artefact ($size bytes)"
              fi
            done
          done
          exit $fail

  # ---------------------------------------------------------------------------
  # 8. Build the wp.org distribution ZIP and verify size + structure.
  #    Catches drift between the dev install and the production-only ZIP that
  #    ships to wp.org — composer dev deps slipping into the bundle, missing
  #    build/ artefacts after a webpack refactor, `.distignore` regressions
  #    that re-introduce excluded paths, the ZIP creeping over wp.org's 10 MB
  #    per-file ceiling. Runs the same `tools/build-zip.sh` an operator runs
  #    locally before submission.
  # ---------------------------------------------------------------------------
  build-zip-verify:
    name: Build ZIP + size check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2

      - name: Install Node dependencies (deterministic)
        run: npm ci

      - name: Build distribution ZIP
        run: bash tools/build-zip.sh

      - name: Inspect ZIP structure
        run: |
          ZIP=$(ls -1 dist/ai-readiness-kit-*.zip | head -n1)
          echo "Built: $ZIP"
          unzip -l "$ZIP" | head -20
          echo ""
          echo "File count: $(unzip -l "$ZIP" | tail -1 | awk '{print $2}')"

      - name: Verify ZIP excludes dev paths
        run: |
          ZIP=$(ls -1 dist/ai-readiness-kit-*.zip | head -n1)
          # Paths that MUST NOT appear inside the ZIP — mirrors `.distignore`.
          # Any of these slipping through means a regression in either the
          # exclude list or rsync invocation in tools/build-zip.sh.
          BANNED=(
            'ai-readiness-kit/\.claude/'
            'ai-readiness-kit/\.github/'
            'ai-readiness-kit/tests/'
            'ai-readiness-kit/tools/'
            'ai-readiness-kit/docs/'
            'ai-readiness-kit/src/'
            'ai-readiness-kit/node_modules/'
            'ai-readiness-kit/assets/'
            'ai-readiness-kit/package\.json'
            'ai-readiness-kit/package-lock\.json'
            'ai-readiness-kit/webpack\.config\.js'
            'ai-readiness-kit/README\.md'
            'ai-readiness-kit/\.distignore'
            'ai-readiness-kit/phpcs\.xml\.dist'
            'ai-readiness-kit/phpstan\.neon\.dist'
            'ai-readiness-kit/phpunit\.xml\.dist'
          )
          fail=0
          for p in "${BANNED[@]}"; do
            if unzip -l "$ZIP" | grep -qE "$p"; then
              echo "::error::Banned path present in ZIP: $p"
              fail=1
            fi
          done
          exit $fail

      - name: Verify required paths present
        run: |
          ZIP=$(ls -1 dist/ai-readiness-kit-*.zip | head -n1)
          REQUIRED=(
            'ai-readiness-kit/ai-readiness-kit\.php'
            'ai-readiness-kit/readme\.txt'
            'ai-readiness-kit/LICENSE'
            'ai-readiness-kit/uninstall\.php'
            'ai-readiness-kit/includes/Main\.php'
            'ai-readiness-kit/build/admin/'
            'ai-readiness-kit/vendor/autoload\.php'
          )
          fail=0
          for p in "${REQUIRED[@]}"; do
            if ! unzip -l "$ZIP" | grep -qE "$p"; then
              echo "::error::Required path missing from ZIP: $p"
              fail=1
            fi
          done
          exit $fail

      - name: Verify ZIP size under wp.org 10 MB ceiling
        run: |
          ZIP=$(ls -1 dist/ai-readiness-kit-*.zip | head -n1)
          SIZE=$(stat -c%s "$ZIP")
          MB=$(awk "BEGIN{printf \"%.2f\", $SIZE/1048576}")
          echo "ZIP size: $MB MB ($SIZE bytes)"
          if [ "$SIZE" -gt 10485760 ]; then
            echo "::error::ZIP exceeds wp.org 10 MB ceiling: $MB MB"
            exit 1
          fi

      - name: Upload built ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-readiness-kit-zip
          path: dist/ai-readiness-kit-*.zip
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 9. Production dependency audit (regression guard for GH-173).
  #    Audits ONLY the shipped surface (`--omit=dev`). The plugin ZIP carries
  #    no JS dependencies — `node_modules/` is excluded by `.distignore` and
  #    verified absent in build-zip-verify above — so the true runtime surface
  #    is the composer prod tree (and that's `composer audit`-clean separately).
  #    Dev tooling (`@wordpress/env`, `@wordpress/scripts` → webpack / wp-playground)
  #    carries upstream-pinned transitive advisories with no leaf fix available
  #    (ajv $data ReDoS, webpack-dev-server, ws). Those are documented and
  #    deliberately NOT gated here so the gate never goes red on dev noise —
  #    while still failing loudly the moment a real advisory reaches prod.
  #    See docs/dependency-audit.md.
  # ---------------------------------------------------------------------------
  npm-audit-prod:
    name: npm audit (production deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies (deterministic)
        run: npm ci

      - name: Audit production dependencies (must stay at 0)
        run: npm audit --omit=dev
